<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --sidebar-color: #1a1a1a;
            --accent-color: #4da6ff;
            --text-color: #ffffff;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 250px;
            background-color: var(--sidebar-color);
            padding: 20px;
            border-right: 2px solid var(--accent-color);
        }

        .menu-item {
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #333;
            border-radius: 5px;
            text-align: center;
        }

        .menu-item:hover {
            background-color: var(--accent-color);
            color: black;
        }

        #content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .section { display: none; }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid var(--accent-color);
            margin-bottom: 20px;
        }

        h1, h2 { color: var(--accent-color); }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .item {
            background: #262626;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Panda</h2>
        <div class="menu-item" onclick="show('bio')">Biografia</div>
        <div class="menu-item" onclick="show('staff')">Staff Experience</div>
    </div>

    <div id="content">
        <div id="bio" class="section" style="display: block;">
            <div class="card">
                <h1>Biografia</h1>
                <p>Ragazzo di 15 anni appassionato di sicurezza nei server Minecraft.</p>
                <p>Studio tecniche di ScreenSharing (SS) e sono attualmente staff su AuraMc.</p>
            </div>
        </div>

        <div id="staff" class="section">
            <h1>Staff Experience</h1>
            
            <h2>Discord</h2>
            <div class="grid-container">
                <div class="item">
                    <h3>Hollow Bypass</h3>
                    <p>Ruolo: Headquarters</p>
                </div>
            </div>

            <h2>Minecraft</h2>
            <div class="grid-container">
                <div class="item">
                    <h3>AuraMc</h3>
                    <p>Ruolo: Staff Member</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
