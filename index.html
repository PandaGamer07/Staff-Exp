<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #201319;
            --sidebar-color: #120b0e;
            --accent-color: #4da6ff;
            --text-color: #ffffff;
            --box-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        #sidebar { width: 250px; background-color: var(--sidebar-color); padding: 20px; border-right: 1px solid #333; }
        .menu-item { padding: 15px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .menu-item:hover { background-color: var(--accent-color); color: black; }

        /* Content */
        #content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .profile-container { width: 100%; max-width: 600px; text-align: center; }
        
        .card { background: var(--box-bg); padding: 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        
        /* Dati Profilo */
        .info-row { margin: 10px 0; font-size: 1.1em; }
        .info-row b { color: var(--accent-color); }
        .quote { font-style: italic; color: #888; margin-top: 20px; }

        .section { display: none; }
        h1 { color: var(--accent-color); }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Panda</h2>
        <div class="menu-item" onclick="show('bio')">Biografia</div>
        <div class="menu-item" onclick="show('staff')">Staff Experience</div>
    </div>

    <div id="content">
        <div id="bio" class="profile-container section" style="display: block;">
            <div class="card">
                <h1>Panda</h1>
                <div class="info-row"><b>Età:</b> 15 anni</div>
                <div class="info-row"><b>Luogo:</b> Italia</div>
                <div class="info-row"><b>Occupazione:</b> Studente / Staff</div>
                <p class="quote">"Se nel primo atto c'è una pistola appesa al muro, deve sparare entro l'ultimo."</p>
            </div>
        </div>

        <div id="staff" class="section" style="width: 100%;">
            <div class="card">
                <h2>Staff Experience</h2>
                <p>Qui puoi aggiungere le tue esperienze seguendo il formato delle card.</p>
            </div>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
