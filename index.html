<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #201319; /* Bordeaux scuro di fondo */
            --sidebar-color: #120b0e;
            --accent-color: #4da6ff; /* Blu chiaro richiesto */
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 250px;
            background-color: var(--sidebar-color);
            padding: 30px;
            border-right: 1px solid #333;
        }

        .menu-item {
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            background: #201319;
            border: 1px solid #333;
            border-radius: 8px;
            text-align: center;
            transition: 0.3s;
        }

        .menu-item:hover {
            background-color: var(--accent-color);
            color: black;
        }

        #content {
            flex-grow: 1;
            padding: 50px;
            overflow-y: auto;
        }

        .section { display: none; }

        .card {
            background: #120b0e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }

        h1, h2 { color: var(--accent-color); margin-top: 0; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .item {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .item:hover { border-color: var(--accent-color); }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="text-align:center;">Panda</h2>
        <div class="menu-item" onclick="show('bio')">Biografia</div>
        <div class="menu-item" onclick="show('staff')">Staff Experience</div>
    </div>

    <div id="content">
        <div id="bio" class="section" style="display: block;">
            <div class="card">
                <h1>Biografia</h1>
                <p>Ragazzo di 15 anni appassionato di sicurezza nei server Minecraft.</p>
                <p>Studio tecniche di ScreenSharing e sono attualmente staff su AuraMc.</p>
            </div>
        </div>

        <div id="staff" class="section">
            <h1>Staff Experience</h1>
            
            <h2>Discord</h2>
            <div class="grid-container">
                <div class="item">
                    <h3>Divine SS Learn IT</h3>
                    <p>Ruolo: Owner SS</p>
                </div>
            </div>

            <h2 style="margin-top: 30px;">Minecraft</h2>
            <div class="grid-container">
                <div class="item">
                    <h3>AuraMc</h3>
                    <p>Ruolo: Jr Mod</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
